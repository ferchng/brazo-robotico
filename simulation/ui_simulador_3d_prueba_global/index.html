<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prueba 3D Global</title>
  <style>
    body {
      margin: 0;
      background: #08101c;
      color: #e5e7eb;
      font-family: Segoe UI, Arial, sans-serif;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 { margin: 0 0 10px; }
    .sub { color: #94a3b8; margin-bottom: 14px; }
    #viewer {
      width: 100%;
      height: 720px;
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
      background: #020617;
    }
    .status {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #334155;
      border-radius: 12px;
      background: #0f172a;
      white-space: pre-wrap;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Prueba 3D global</h1>
    <div class="sub">Esto no usa módulos. Si esto tampoco se ve, el problema ya no es tu HTML sino la carga de scripts externos o el navegador.</div>
    <div id="viewer"></div>
    <div id="status" class="status">Cargando scripts...</div>
  </div>

  <script src="https://unpkg.com/three@0.165.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.165.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    const statusEl = document.getElementById("status");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    try {
      if (!window.THREE) {
        throw new Error("THREE no cargó.");
      }

      const container = document.getElementById("viewer");
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      container.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0b1020);

      const camera = new THREE.PerspectiveCamera(
        45,
        container.clientWidth / container.clientHeight,
        0.1,
        2000
      );
      camera.position.set(180, 160, 220);

      let controls = null;
      if (THREE.OrbitControls) {
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 70, 0);
      }

      const hemi = new THREE.HemisphereLight(0xdbeafe, 0x0f172a, 1.25);
      scene.add(hemi);

      const dir = new THREE.DirectionalLight(0xffffff, 1.2);
      dir.position.set(180, 220, 140);
      scene.add(dir);

      const grid = new THREE.GridHelper(500, 20, 0x334155, 0x1e293b);
      grid.rotation.x = Math.PI / 2;
      scene.add(grid);

      const axes = new THREE.AxesHelper(80);
      scene.add(axes);

      const base = new THREE.Mesh(
        new THREE.BoxGeometry(35, 100, 80),
        new THREE.MeshStandardMaterial({ color: 0x475569 })
      );
      base.position.set(0, 50, 0);
      scene.add(base);

      const arm1 = new THREE.Mesh(
        new THREE.BoxGeometry(113, 25, 25),
        new THREE.MeshStandardMaterial({ color: 0x22c55e })
      );
      arm1.position.set(-40, 130, 0);
      arm1.rotation.z = Math.PI / 4;
      scene.add(arm1);

      const arm2 = new THREE.Mesh(
        new THREE.BoxGeometry(137, 25, 25),
        new THREE.MeshStandardMaterial({ color: 0x38bdf8 })
      );
      arm2.position.set(-120, 210, 0);
      arm2.rotation.z = Math.PI / 8;
      scene.add(arm2);

      const grip = new THREE.Mesh(
        new THREE.BoxGeometry(100, 65, 25),
        new THREE.MeshStandardMaterial({ color: 0xa78bfa, transparent: true, opacity: 0.82 })
      );
      grip.position.set(-190, 235, 0);
      grip.rotation.z = -Math.PI / 8;
      scene.add(grip);

      function animate() {
        requestAnimationFrame(animate);
        arm1.rotation.z += 0.002;
        arm2.rotation.z -= 0.003;
        grip.rotation.z += 0.004;
        if (controls) controls.update();
        renderer.render(scene, camera);
      }

      window.addEventListener("resize", () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      });

      setStatus("OK: Three.js cargó y la escena se creó. Si no ves nada, abrí la consola del navegador porque ya no es un problema del código base.");
      animate();
    } catch (err) {
      setStatus("ERROR al inicializar la escena:\n" + err.message);
      console.error(err);
    }
  </script>
</body>
</html>
